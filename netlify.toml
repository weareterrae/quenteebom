[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Domínio antigo quenteebom.co.ao -> quenteebom.com (o email continua no .co.ao, só o site redireciona).
# Estes redirects por host têm de vir ANTES dos redirects por caminho.
[[redirects]]
  from = "https://quenteebom.co.ao/*"
  to = "https://quenteebom.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.quenteebom.co.ao/*"
  to = "https://quenteebom.com/:splat"
  status = 301
  force = true

# Revendedores fundiu-se na Área Profissional (jul/2026) — links antigos continuam a funcionar
[[redirects]]
  from = "/receitas/tranca-doce-de-brioche/"
  to = "/receitas/bolo-de-chocolate-e-pera/"
  status = 301

[[redirects]]
  from = "/revendedores/"
  to = "/profissional/revendedor/"
  status = 301

[[redirects]]
  from = "/revendedores"
  to = "/profissional/revendedor/"
  status = 301

# URLs intuitivos (labels do menu) → páginas reais
[[redirects]]
  from = "/carreiras/*"
  to = "/recrutamento/"
  status = 301

[[redirects]]
  from = "/carreiras"
  to = "/recrutamento/"
  status = 301

[[redirects]]
  from = "/contactos/*"
  to = "/contacto/"
  status = 301

[[redirects]]
  from = "/contactos"
  to = "/contacto/"
  status = 301

# CSS e JS mudam com o design — cache curta, revalida sempre
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# imagens e fontes são estáveis — cache longa
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/produtos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/font/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
