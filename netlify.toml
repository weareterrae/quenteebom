[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Revendedores fundiu-se na Área Profissional (jul/2026) — links antigos continuam a funcionar
[[redirects]]
  from = "/receitas/tranca-doce-de-brioche/"
  to = "/receitas/bolo-de-chocolate-e-pera/"
  status = 301

[[redirects]]
  from = "/revendedores/"
  to = "/profissional/revendedor/"
  status = 301

[[redirects]]
  from = "/revendedores"
  to = "/profissional/revendedor/"
  status = 301

# URLs intuitivos (labels do menu) → páginas reais
[[redirects]]
  from = "/carreiras/*"
  to = "/recrutamento/"
  status = 301

[[redirects]]
  from = "/carreiras"
  to = "/recrutamento/"
  status = 301

[[redirects]]
  from = "/contactos/*"
  to = "/contacto/"
  status = 301

[[redirects]]
  from = "/contactos"
  to = "/contacto/"
  status = 301

# CSS e JS mudam com o design — cache curta, revalida sempre
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# imagens e fontes são estáveis — cache longa
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/produtos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/font/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
